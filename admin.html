<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Store Admin | Aromatic Designer Works</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="account.css"></head>
<body><header class="admin-header"><a href="index.html"><img src="assets/logo.png" alt="ADW"></a><div class="admin-actions"><a class="account-button ghost" href="index.html">View store</a><button id="signout" class="account-primary">Sign out</button></div></header>
<main id="app" class="admin-main" hidden><div class="admin-heading"><div><small>PROTECTED ADMIN AREA</small><h1>Store dashboard</h1></div><button id="add" class="account-primary">+ Add product</button></div>
<div class="admin-stats"><div class="admin-stat">Products<b id="product-count">—</b></div><div class="admin-stat">Orders<b id="order-count">—</b></div><div class="admin-stat">Subscribers<b id="subscriber-count">—</b></div></div>
<section class="admin-panel"><h2>Products</h2><div id="products"></div></section><section class="admin-panel"><h2>Recent orders</h2><div id="orders"></div></section></main><div class="admin-loading" id="loading">Checking secure access…</div>
<dialog id="editor" class="admin-dialog"><form id="product-form" class="product-form"><h2 id="form-title">Add product</h2><input id="product-id" type="hidden"><div class="form-grid">
<label>Name<input id="product-name" required></label><label>Slug<input id="slug" required pattern="[a-z0-9-]+"></label><label>Category<select id="category"><option>candles</option><option>soaps</option><option>accessories</option></select></label><label>Price in dollars<input id="price" type="number" min="0" step=".01" required></label><label>Inventory (blank = unlimited)<input id="inventory" type="number" min="0"></label><label>Sort order<input id="sort" type="number" value="0"></label><label>Badge<input id="badge"></label><label>Visual/emoji<input id="visual" value="✦"></label><label>Color<input id="color" type="color" value="#efe4d4"></label><label>Active<select id="active"><option value="true">Yes</option><option value="false">No</option></select></label><label class="form-full">Description<textarea id="description"></textarea></label></div><p id="notice" class="form-notice"></p><div class="form-actions"><button type="button" class="ghost" id="cancel">Cancel</button><button class="account-primary">Save product</button></div></form></dialog>
<script src="config.js"></script><script type="module" src="admin.js"></script></body></html>
